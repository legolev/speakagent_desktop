# .github/FUNDING.yml — кнопка «Sponsor» в шапке репозитория.
#
# Ни один «нативный» ключ (github, ko_fi, patreon, liberapay, buy_me_a_coffee,
# open_collective) не подходит получателю в РФ — все на Stripe / PayPal / Payoneer.
# Поэтому только custom-ссылки. Крипто-адреса (BTC / TON) — в README, раздел «Поддержать».
custom:
  - "https://boosty.to/utekov"
