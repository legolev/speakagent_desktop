name: Release

# Как выпустить релиз:
#   1) поднять "version" в src-tauri/tauri.conf.json и package.json (напр. 0.1.1)
#   2) git commit && git tag v0.1.1 && git push origin v0.1.1
# CI соберёт .dmg (macOS) и .exe (Windows), подпишет артефакты обновления и опубликует
# GitHub Release + latest.json (по нему работает автообновление в приложении).
#
# Требуются секреты репозитория:
#   TAURI_SIGNING_PRIVATE_KEY          — приватный ключ обновлений (см. README «Релизы»)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — пароль ключа (пустой, если ключ без пароля)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14 # Apple Silicon (arm64) — нативно
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          # Intel собираем КРОСС-компиляцией на arm64-раннере macos-14: нативные Intel-раннеры
          # (macos-13) дефицитны и выводятся из строя → джоб зависал в очереди часами.
          - platform: macos-14 # Intel (x86_64) — кросс-компиляция
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
            experimental: true # best-effort: провал/зависание НЕ блокирует релиз
          - platform: windows-latest
            target: ""
            args: ""
    runs-on: ${{ matrix.platform }}
    # Intel помечен experimental → его провал не роняет релиз (выходит с Win + arm64 —
    # они обязательные). timeout страхует от зависших джобов.
    continue-on-error: ${{ matrix.experimental || false }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      # macOS: импорт самоподписанного сертификата подписи кода в временный keychain.
      # Стабильная «личность» (Authority=SpeakAgent) → разрешения (Universal Access /
      # Input Monitoring) переживают обновления, и Gatekeeper мягче («правый клик → Открыть»
      # вместо «повреждено»). ВАЖНО: сертификату НЕ добавляем trust (add-trusted-cert) —
      # в headless-CI это вызывает GUI-запрос авторизации и НАВСЕГДА вешает джоб; для
      # codesign доверие не нужно (хватает приватного ключа в keychain, identity видна
      # в find-identity -v -p codesigning). Trust в CI-машине всё равно выбрасывается.
      - name: Import macOS signing certificate
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE:-}" ]; then
            echo "::error::APPLE_CERTIFICATE не задан. Отказ: ad-hoc-подпись даёт cdhash-Designated-Requirement, который меняется каждую сборку → TCC-разрешения диктовки (Input Monitoring/Accessibility) слетают при КАЖДОМ обновлении. Задайте секреты APPLE_CERTIFICATE/_PASSWORD/APPLE_SIGNING_IDENTITY/KEYCHAIN_PASSWORD."
            exit 1
          fi
          KC="$RUNNER_TEMP/app-signing.keychain-db"
          P12="$RUNNER_TEMP/cert.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$P12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          security import "$P12" -k "$KC" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KC" >/dev/null
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | sed 's/[",]//g' | xargs)
          security find-identity -v -p codesigning "$KC"

      # tauri-action соберёт фронтенд+бэкенд (beforeBuildCommand скачает вшиваемые модели),
      # подпишет .app сертификатом (APPLE_SIGNING_IDENTITY) + артефакты обновления и создаст/
      # дополнит GitHub Release + latest.json.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          tagName: v__VERSION__
          releaseName: "SpeakAgent v__VERSION__"
          releaseBody: |
            Скачайте установщик для своей системы:
            - **macOS Apple Silicon (M1+)** — `*_aarch64.dmg`
            - **macOS Intel** — `*_x64.dmg`
            - **Windows 10/11** — `*-setup.exe`

            **Первый запуск** (приложение пока без платной подписи разработчика):
            - **macOS** — перетащите в «Программы», затем **правый клик по приложению → «Открыть»** → «Открыть».
              Если пишет «повреждено» — выполните один раз в Терминале: `xattr -cr /Applications/SpeakAgent.app`
            - **Windows** — в окне SmartScreen: «Подробнее» → «Всё равно выполнить».

            Уже установленное приложение обновится само — «О приложении» → «Проверить».
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # Страховка: сборка НЕ должна быть ad-hoc. Ad-hoc → Designated Requirement по cdhash,
      # который меняется каждую сборку → TCC-разрешения диктовки слетают при каждом обновлении
      # (и переключатель в Настройках не помогает). Стабильная (само)подпись даёт DR по leaf-hash.
      - name: Assert macOS build is not ad-hoc signed
        if: startsWith(matrix.platform, 'macos')
        run: |
          set -uo pipefail
          APP=$(find src-tauri/target -maxdepth 6 -name 'SpeakAgent.app' -type d | head -1)
          if [ -z "$APP" ]; then echo "SpeakAgent.app не найден — пропуск проверки."; exit 0; fi
          echo "Проверяю подпись: $APP"
          INFO=$(codesign -dvvv "$APP" 2>&1 || true)
          echo "$INFO"
          if echo "$INFO" | grep -q 'Signature=adhoc'; then
            echo "::error::Приложение подписано ad-hoc — TCC-разрешения диктовки будут слетать при каждом обновлении. Проверьте APPLE_SIGNING_IDENTITY и что сертификат применился."
            exit 1
          fi
          echo "OK: подпись не ad-hoc (Designated Requirement стабилен между сборками)."

      # Дублируем установщик под СТАБИЛЬНЫМ (без версии) именем и грузим в релиз — чтобы в
      # README работали прямые кнопки `releases/latest/download/SpeakAgent-<платформа>`.
      # Штатные имена tauri содержат версию, поэтому «latest»-ссылка ломалась бы каждый релиз.
      - name: Upload stable-named installer (README direct-download buttons)
        if: startsWith(matrix.platform, 'macos') || startsWith(matrix.platform, 'windows')
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          case "${{ matrix.target }}" in
            aarch64-apple-darwin) SRC=$(find src-tauri/target -name '*_aarch64.dmg' | head -1); DST="SpeakAgent-macOS-Apple-Silicon.dmg" ;;
            x86_64-apple-darwin)  SRC=$(find src-tauri/target -name '*_x64.dmg' | head -1);      DST="SpeakAgent-macOS-Intel.dmg" ;;
            *)                    SRC=$(find src-tauri/target -name '*-setup.exe' | head -1);    DST="SpeakAgent-Windows-Setup.exe" ;;
          esac
          if [ -z "${SRC:-}" ] || [ ! -f "$SRC" ]; then echo "installer not found — skip"; exit 0; fi
          cp "$SRC" "$DST"
          gh release upload "${{ github.ref_name }}" "$DST" --clobber --repo "${{ github.repository }}"
          echo "uploaded stable-named asset: $DST"
