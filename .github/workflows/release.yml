name: Release

# Как выпустить релиз:
#   1) поднять "version" в src-tauri/tauri.conf.json и package.json (напр. 0.1.1)
#   2) git commit && git tag v0.1.1 && git push origin v0.1.1
# CI соберёт .dmg (macOS) и .exe (Windows), подпишет артефакты обновления и опубликует
# GitHub Release + latest.json (по нему работает автообновление в приложении).
#
# Требуются секреты репозитория:
#   TAURI_SIGNING_PRIVATE_KEY          — приватный ключ обновлений (см. README «Релизы»)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — пароль ключа (пустой, если ключ без пароля)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14 # Apple Silicon (arm64)
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: macos-13 # Intel (x86_64)
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest
            target: ""
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      # macOS: импорт самоподписанного сертификата подписи кода в временный keychain.
      # Стабильная «личность» (Authority=SpeakAgent) → разрешения (Universal Access /
      # Input Monitoring) переживают обновления, и Gatekeeper мягче («правый клик → Открыть»
      # вместо «повреждено»). ВАЖНО: сертификату НЕ добавляем trust (add-trusted-cert) —
      # в headless-CI это вызывает GUI-запрос авторизации и НАВСЕГДА вешает джоб; для
      # codesign доверие не нужно (хватает приватного ключа в keychain, identity видна
      # в find-identity -v -p codesigning). Trust в CI-машине всё равно выбрасывается.
      - name: Import macOS signing certificate
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE:-}" ]; then
            echo "APPLE_CERTIFICATE не задан — сборка без подписи сертификатом (ad-hoc)."
            exit 0
          fi
          KC="$RUNNER_TEMP/app-signing.keychain-db"
          P12="$RUNNER_TEMP/cert.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$P12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          security import "$P12" -k "$KC" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KC" >/dev/null
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | sed 's/[",]//g' | xargs)
          security find-identity -v -p codesigning "$KC"

      # tauri-action соберёт фронтенд+бэкенд (beforeBuildCommand скачает вшиваемые модели),
      # подпишет .app сертификатом (APPLE_SIGNING_IDENTITY) + артефакты обновления и создаст/
      # дополнит GitHub Release + latest.json.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          tagName: v__VERSION__
          releaseName: "SpeakAgent v__VERSION__"
          releaseBody: |
            Скачайте установщик для своей системы:
            - **macOS Apple Silicon (M1+)** — `*_aarch64.dmg`
            - **macOS Intel** — `*_x64.dmg`
            - **Windows 10/11** — `*-setup.exe`

            **Первый запуск** (приложение пока без платной подписи разработчика):
            - **macOS** — перетащите в «Программы», затем **правый клик по приложению → «Открыть»** → «Открыть».
              Если пишет «повреждено» — выполните один раз в Терминале: `xattr -cr /Applications/SpeakAgent.app`
            - **Windows** — в окне SmartScreen: «Подробнее» → «Всё равно выполнить».

            Уже установленное приложение обновится само — «О приложении» → «Проверить».
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
