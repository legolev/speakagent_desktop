name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (build)
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  rust:
    name: Rust (check)
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # tauri-build валидирует bundle.resources (мелкие вшиваемые модели) — их надо
      # скачать до cargo check, иначе build.rs падает «resource path doesn't exist».
      # Скрипт использует только node-builtins + системный tar (bsdtar есть на обоих ранерах).
      - name: Fetch bundled models
        run: node ../scripts/fetch-models.mjs
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Format (informational)
        run: cargo fmt --all -- --check
        continue-on-error: true
      - name: Check
        run: cargo check --all-targets
      - name: Clippy (informational)
        run: cargo clippy --all-targets
        continue-on-error: true
